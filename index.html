<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>English Self Learning Lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>English Self Learning Lab</h1>

<div class="tabs">

<button onclick="switchTab('learning')">Learning</button>
<button onclick="switchTab('drill')">Drill</button>

</div>


<!-- LEARNING PAGE -->
<div id="learningPage" class="page">

<h2>Learning Subjects</h2>

<div class="menu">

<!-- CONTEXT GROUP -->

<button onclick="setSubject('contrast')">Contrast</button>
<button onclick="setSubject('similar')">Similar</button>
<button onclick="setSubject('commonsense')">Commonsense</button>
<button onclick="setSubject('mixed')">Mixed</button>

<br><br>

<!-- ETYMOLOGY GROUP -->

<button onclick="setSubject('angloPrefix')">Anglo-Saxon Prefixes</button>
<button onclick="setSubject('latinPrefix')">Latin Prefixes</button>
<button onclick="setSubject('latinRoot')">Latin Roots</button>
<button onclick="setSubject('greekElement')">Greek Elements</button>
<button onclick="setSubject('phrase')">Phrases&Idioms</button>

</div>

<div id="learningContent">
Select a subject to study.
</div>

</div>


<!-- DRILL PAGE -->
<div id="drillPage" class="page" style="display:none">

<h2>Flash cards</h2>

<div id="trainer">

<div id="question"></div>

<input id="answer" type="text">

<!-- future MCQ area -->
<!--
<div id="mcq">
<button class="choice"></button>
<button class="choice"></button>
<button class="choice"></button>
<button class="choice"></button>
</div>
-->

<div class="buttons">

<button onclick="check()">Check</button>
<button onclick="hint()">Hint</button>
<button onclick="next()">Next</button>

</div>

<div id="result"></div>

</div>

</div>


<!-- DATA FILES -->

<script src="data/contrast.js"></script>
<script src="data/similar.js"></script>
<script src="data/commonsense.js"></script>
<script src="data/mixed.js"></script>

<script src="data/anglo_prefix.js"></script>
<script src="data/latin_prefix.js"></script>
<script src="data/latin_roots.js"></script>
<script src="data/greek_elements.js"></script>
<script src="data/phrasal.js"></script>

<script src="lib/marked.min.js"></script>
<script src="app.js"></script>

<div id="version">v0.81</div>

</body>
</html>
