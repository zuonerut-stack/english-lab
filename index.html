<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>English Self Learning Lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>English Self Learning Lab</h1>

<!-- MAIN TAB -->
<div class="tabs">

<button onclick="switchTab('learning')">Learning</button>
<button onclick="switchTab('drill')">Drill</button>

</div>


<!-- LEARNING PAGE -->
<div id="learningPage" class="page">

<h2>Learning Subjects</h2>

<div class="menu">

<button onclick="setSubject('contrast')">Contrast</button>
<button onclick="setSubject('similarity')">Similarity</button>
<button onclick="setSubject('phrasal')">Phrase Verbs</button>
<button onclick="setSubject('roots')">Word Roots</button>

</div>

<div id="learningContent">

Select a subject to study.

</div>

</div>


<!-- DRILL PAGE -->
<div id="drillPage" class="page" style="display:none">

<h2>Flash Card Drill</h2>

<div id="trainer">

<div id="question"></div>

<input id="answer" type="text">

<div class="buttons">

<button onclick="check()">Check</button>
<button onclick="hint()">Hint</button>
<button onclick="next()">Next</button>

</div>

<div id="result"></div>

</div>

</div>


<script src="data/contrast.js"></script>
<script src="data/similarity.js"></script>
<script src="data/phrasal.js"></script>
<script src="data/roots.js"></script>
<script src="lib/marked.min.js"></script>
<script src="app.js"></script>

<div id="version">v0.2</div>

</body>
</html>
